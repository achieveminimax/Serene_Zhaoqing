server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: dev
        group: DEFAULT_GROUP
        refresh-enabled: true
    sentinel:
      transport:
        dashboard: 127.0.0.1:8080
        port: 8719
      eager: true
      datasource:
        ds1:
          nacos:
            server-addr: 127.0.0.1:8848
            dataId: ${spring.application.name}-sentinel
            groupId: DEFAULT_GROUP
            namespace: dev
            rule-type: gw-flow
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - StripPrefix=0

        - id: scenic-service
          uri: lb://scenic-service
          predicates:
            - Path=/api/v1/scenic/**, /api/v1/home/**
          filters:
            - StripPrefix=0

        - id: music-service
          uri: lb://music-service
          predicates:
            - Path=/api/v1/music/**
          filters:
            - StripPrefix=0

        - id: recipe-service
          uri: lb://recipe-service
          predicates:
            - Path=/api/v1/recipe/**
          filters:
            - StripPrefix=0

        - id: shop-service
          uri: lb://shop-service
          predicates:
            - Path=/api/v1/shop/**, /api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: health-service
          uri: lb://health-service
          predicates:
            - Path=/api/v1/health/**
          filters:
            - StripPrefix=0

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=0

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=0

        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/v1/file/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

gateway:
  auth:
    enabled: true
    white-list:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/sms-code
      - /api/v1/auth/wx-login
      - /api/v1/home/**
      - /api/v1/scenic/**
      - /api/v1/search/**
      - /actuator/**

logging:
  level:
    com.zqtravel.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
