spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: ${spring.profiles.active}
        group: DEFAULT_GROUP
        refresh-enabled: true
        shared-configs:
          - dataId: common-redis.yaml
            group: DEFAULT_GROUP
            refresh: true
